<style>
  :root{
    --text:#010b09;
    --primary:#06372d;
    --secondary:#fcd078;
    --ink:#010b09;
    --paper:#f9fefd;
    --muted:#566B65;
    --line:rgba(6,55,45,0.10);
    --accent:#ff5e00;
    --display: 'Geist', system-ui, sans-serif;
    --serif: 'Instrument Serif', serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--display);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  body{overflow-x:hidden}
  a{color:inherit}
  ::selection{background:var(--accent);color:var(--paper)}

  /* utility */
  .wrap{max-width:1440px;margin:0 auto;padding:0 56px}
  @media (max-width: 900px){ .wrap{padding:0 24px} }

  .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:0.14em;
    text-transform:uppercase;color:var(--muted);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(255,94,0,0.18); }
    50%      { box-shadow: 0 0 0 8px rgba(255,94,0,0.04); }
  }

  /* Soundwave mark — 5 bars: kick → decay → snare → decay → tail */
  .sw rect { transform-box: fill-box; transform-origin: 50% 50%; }
  .sw rect:nth-child(1) { animation: sw-hit   1.6s ease-out      infinite; animation-delay: 0s;   }
  .sw rect:nth-child(2) { animation: sw-decay 1.6s ease-in-out   infinite; animation-delay: .15s; }
  .sw rect:nth-child(3) { animation: sw-hit   1.6s ease-out      infinite; animation-delay: .4s;  }
  .sw rect:nth-child(4) { animation: sw-decay 1.6s ease-in-out   infinite; animation-delay: .55s; }
  .sw rect:nth-child(5) { animation: sw-decay 1.6s ease-in-out   infinite; animation-delay: .75s; }
  @keyframes sw-decay { 0%, 100% { transform: scaleY(0.55); } 50% { transform: scaleY(1); } }
  @keyframes sw-hit   { 0%, 8%, 100% { transform: scaleY(1); } 4% { transform: scaleY(1.08); } }
  @media (prefers-reduced-motion: reduce) { .sw rect { animation: none !important; } }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .cta-primary:hover .cta-arr { transform: translateX(3px); }

  /* link underline grow */
  .link-uline{position:relative;display:inline-block;}
  .link-uline::after{
    content:'';position:absolute;left:0;bottom:-2px;height:1px;width:100%;
    background:currentColor;transform-origin:right;transform:scaleX(1);
    transition:transform .4s cubic-bezier(.2,.7,.2,1);
  }
  .link-uline:hover::after{transform-origin:left;transform:scaleX(1);}

  /* Nav link */
  .navlink{
    position:relative;text-decoration:none;color:var(--ink);font-size:14px;font-weight:500;
    padding:6px 2px;
  }
  .navlink::after{
    content:'';position:absolute;left:0;bottom:-2px;height:1px;width:100%;background:currentColor;
    transform:scaleX(0);transform-origin:right;transition:transform .35s cubic-bezier(.2,.7,.2,1);
  }
  .navlink:hover::after{transform:scaleX(1);transform-origin:left;}
</style>
